services:
  # 1. Database: MySQL
  db:
    image: mysql:8.0
    container_name: hris_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:${DB_PORT}:3306"
    networks:
      - hris_network

  # 2. Application Backend: Flask + Gunicorn
  app:
    build: .
    container_name: hris_app
    restart: always
    depends_on:
      - db
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}
      SECRET_KEY: ${SECRET_KEY}
    networks:
      - hris_network

  # 3. Web Server: Nginx
  web:
    image: nginx:stable-alpine
    container_name: hris_nginx
    restart: always
    depends_on:
      - app
      - phpmyadmin
    env_file:
      - .env
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./nginx/ssl/nginx.crt:/etc/nginx/ssl/nginx.crt:ro
      - ./nginx/ssl/nginx.key:/etc/nginx/ssl/nginx.key:ro
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - hris_network

  # 4. Database Management: phpMyAdmin 
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: hris_phpmyadmin
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
    ports:
      - "127.0.0.1:${PMA_PORT_MAP}:80"
    networks:
      - hris_network

  # 5. Remote Access: Cloudflare Tunnel
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: hris_tunnel
    restart: always
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - web
    networks:
      - hris_network

volumes:
  mysql_data:

networks:
  hris_network:
    driver: bridge
